<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Family Album | Digital Scrapbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf6; }
        h1, h2, .serif { font-family: 'Playfair Display', serif; }
        .scrapbook-card { transition: transform 0.3s ease; }
        .scrapbook-card:hover { transform: rotate(-1deg) scale(1.02); }
    </style>
</head>
<body class="text-stone-800">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold italic text-orange-900">Our Memories</h1>
        <button onclick="toggleModal('upload-modal')" class="bg-orange-100 hover:bg-orange-200 text-orange-900 px-6 py-2 rounded-full border border-orange-200 transition">
            + Add New Memory
        </button>
    </nav>

    <header class="text-center py-16 px-4">
        <h2 class="text-5xl md:text-6xl mb-4">The Family Archive</h2>
        <p class="text-stone-500 italic">"Every picture tells a story, and every story is a treasure."</p>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-stone-200 h-64 rounded-lg"></div>
            <div class="animate-pulse bg-stone-200 h-64 rounded-lg"></div>
            <div class="animate-pulse bg-stone-200 h-64 rounded-lg"></div>
        </div>
    </main>

    <div id="upload-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 class="serif text-2xl mb-4">Add to Scrapbook</h3>
            <form id="upload-form" class="space-y-4">
                <input type="file" id="photo-input" accept="image/*" class="w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" required>
                <input type="text" id="photo-title" placeholder="Title (e.g. Grandma's 80th)" class="w-full p-3 border-stone-200 border rounded-lg focus:ring-2 focus:ring-orange-200 outline-none">
                <textarea id="photo-note" placeholder="Write a memory..." class="w-full p-3 border-stone-200 border rounded-lg h-32 focus:ring-2 focus:ring-orange-200 outline-none"></textarea>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="toggleModal('upload-modal')" class="px-4 py-2 text-stone-500">Cancel</button>
                    <button type="submit" class="bg-orange-800 text-white px-6 py-2 rounded-lg hover:bg-orange-900 transition">Save Memory</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }
    </script>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:12345:web:6789"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Now you can use 'db' and 'storage' in your code!
</script>

</body>
</html>
